<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cadlog.css">
    <title>MTL - Cadastrar Nova Conta</title>
</head>
<body>
    <main>
    <form method="POST">
        <h2>Login</h2>
        <input type="text" name="nome" placeholder="Nome de Usuário" required>
        <input type="text" name="senha" placeholder="Senha" required>
        <input type="button" name="cadastrar" value="Cadastrar">
    </form>
    <section>
        <p>Não se esqueça da sua senha</p>
        <p>Você não pode mudá-la!</p>
    </section>
    </main>
</body>
</html>
